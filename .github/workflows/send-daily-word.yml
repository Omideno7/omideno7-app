name: Send Daily Word notification

on:
  schedule:
    # Creates a OneSignal local-time delivery for 07:00 on each user's device timezone.
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send notification
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          NOTIFICATION_TYPE: daily-word
        run: node scripts/send-dynamic-notification.js

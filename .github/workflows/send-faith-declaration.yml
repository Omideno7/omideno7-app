name: Send Faith Declaration notification

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Send notification
        env:
          ONESIGNAL_APP_ID: ${ secrets.ONESIGNAL_APP_ID }
          ONESIGNAL_REST_API_KEY: ${ secrets.ONESIGNAL_REST_API_KEY }
          NOTIFICATION_TYPE: faith-declaration
        run: node scripts/send-dynamic-notification.js


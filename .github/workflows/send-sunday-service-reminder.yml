name: Send Sunday Service reminder
on:
  schedule:
    # Sunday 19:30 Europe/Zagreb. Two UTC candidates cover summer/winter; JS guard sends only at true Zagreb Sunday 19:30.
    - cron: '30 17,18 * * 0'
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send Sunday Service reminder
        env:
          NOTIFICATION_TYPE: sunday-service-reminder
          TARGET_LOCAL_HOUR: '19'
          TARGET_LOCAL_MINUTE: '30'
          TARGET_LOCAL_WEEKDAY: '0'
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node scripts/send-dynamic-notification.js

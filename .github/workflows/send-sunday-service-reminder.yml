name: Send Sunday Service reminder
on:
  schedule:
    # Sunday 19:30 Europe/Zagreb: summer 17:30 UTC, winter 18:30 UTC.
    - cron: '30 17,18 * * 0'
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send Sunday Service reminder
        env:
          NOTIFICATION_TYPE: sunday-service-reminder
          APP_VERSION: '584'
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node scripts/send-dynamic-notification.js

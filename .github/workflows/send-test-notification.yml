name: Send Test Notification

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send immediate OneSignal test notification
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: |
          if [ -z "$ONESIGNAL_APP_ID" ]; then
            echo "ONESIGNAL_APP_ID secret is missing"
            exit 1
          fi
          if [ -z "$ONESIGNAL_REST_API_KEY" ]; then
            echo "ONESIGNAL_REST_API_KEY secret is missing"
            exit 1
          fi

          NOW_UTC=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          cat > payload.json <<EOF
          {
            "app_id": "$ONESIGNAL_APP_ID",
            "included_segments": ["Subscribed Users"],
            "headings": {
              "en": "Omideno7 Test Notification",
              "fa": "پیام تست کلیسای امیدنو۷",
              "hr": "Testna obavijest Omideno7"
            },
            "contents": {
              "en": "This is an immediate test notification from Omideno7 Church. Time: $NOW_UTC",
              "fa": "این یک پیام تست فوری از کلیسای امیدنو۷ است. زمان: $NOW_UTC",
              "hr": "Ovo je trenutna testna obavijest crkve Omideno7. Vrijeme: $NOW_UTC"
            },
            "url": "https://omideno7.github.io/omideno7-app/"
          }
          EOF

          echo "Sending OneSignal test notification..."
          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}\n" \
            -X POST "https://api.onesignal.com/notifications" \
            -H "Content-Type: application/json" \
            -H "Authorization: Key $ONESIGNAL_REST_API_KEY" \
            --data @payload.json)

          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | sed -n 's/^HTTP_STATUS://p')
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "OneSignal API returned HTTP $STATUS"
            exit 1
          fi

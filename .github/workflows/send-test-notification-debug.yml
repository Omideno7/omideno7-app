name: Send Test Notification Debug

on:
  workflow_dispatch:

jobs:
  send-test:
    runs-on: ubuntu-latest
    steps:
      - name: Validate GitHub Secrets
        run: |
          if [ -z "${{ secrets.ONESIGNAL_APP_ID }}" ]; then
            echo "ERROR: ONESIGNAL_APP_ID secret is missing or empty."
            exit 1
          fi
          if [ -z "${{ secrets.ONESIGNAL_REST_API_KEY }}" ]; then
            echo "ERROR: ONESIGNAL_REST_API_KEY secret is missing or empty."
            exit 1
          fi
          echo "Secrets are present. App ID length: ${#ONESIGNAL_APP_ID}"
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}

      - name: Send immediate OneSignal test notification
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: |
          set -e
          cat > payload.json <<EOF
          {
            "app_id": "$ONESIGNAL_APP_ID",
            "included_segments": ["All"],
            "headings": {
              "en": "Omideno7 test notification",
              "fa": "پیام تست کلیسای امیدنو۷",
              "hr": "Omideno7 test obavijest"
            },
            "contents": {
              "en": "This is an immediate test notification from GitHub Actions.",
              "fa": "این یک پیام تست فوری از GitHub Actions است.",
              "hr": "Ovo je trenutna testna obavijest iz GitHub Actions."
            },
            "url": "https://omideno7.github.io/omideno7-app/"
          }
          EOF

          echo "Sending test notification to OneSignal using included_segments: All ..."
          HTTP_STATUS=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Basic ${ONESIGNAL_REST_API_KEY}" \
            --data-binary @payload.json)

          echo "OneSignal HTTP status: ${HTTP_STATUS}"
          echo "OneSignal response:"
          cat response.json
          echo ""

          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "ERROR: OneSignal returned a non-success HTTP status."
            exit 1
          fi

          if grep -qi '"errors"' response.json; then
            echo "ERROR: OneSignal response contains errors."
            exit 1
          fi

          echo "Debug test notification request succeeded. Check OneSignal Delivery and target devices."

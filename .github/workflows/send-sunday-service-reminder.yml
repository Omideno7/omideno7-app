name: Send Sunday Service reminder

on:
  schedule:
    # Europe/Zagreb Sunday 19:30, covering summer/winter time. JS verifies exact local time before sending.
    - cron: '30 17,18 * * 0'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send notification
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          NOTIFICATION_TYPE: sunday-service-reminder
        run: node scripts/send-dynamic-notification.js

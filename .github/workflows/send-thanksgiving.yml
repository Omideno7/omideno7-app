name: Send Thanksgiving notification

on:
  schedule:
    - cron: '29 18 * * *'
    - cron: '59 23 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send thanksgiving notification
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          NOTIFICATION_TYPE: thanksgiving
        run: node scripts/send-dynamic-notification.js

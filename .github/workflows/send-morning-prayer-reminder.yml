name: Send Morning Prayer reminder
on:
  schedule:
    # 04:30 Europe/Zagreb. Two UTC candidates cover summer/winter; JS guard sends only at true Zagreb 04:30.
    - cron: '30 2,3 * * *'
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send Morning Prayer reminder
        env:
          NOTIFICATION_TYPE: morning-prayer-reminder
          TARGET_LOCAL_HOUR: '4'
          TARGET_LOCAL_MINUTE: '30'
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node scripts/send-dynamic-notification.js

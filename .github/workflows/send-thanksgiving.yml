name: Send Thanksgiving notification
on:
  schedule:
    # 09:00 Europe/Zagreb. Two UTC candidates cover summer/winter; JS guard sends only at true Zagreb 09:00.
    - cron: '0 7,8 * * *'
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send Thanksgiving notification
        env:
          NOTIFICATION_TYPE: thanksgiving
          TARGET_LOCAL_HOUR: '9'
          TARGET_LOCAL_MINUTE: '0'
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node scripts/send-dynamic-notification.js

<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Omideno7 Admin">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#0f5132">
  <link rel="manifest" href="admin.webmanifest?v=596">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Omideno7 Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--green:#0f5132;--blue:#06146D;--gold:#c9972b;--bg:#f6faf8;--muted:#60756d;--border:#dce8e2}*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;background:var(--bg);color:#17352a;margin:0;min-height:100vh;padding:16px 14px 36px}.top{background:linear-gradient(135deg,var(--green),#083b25);color:white;border-radius:24px;padding:18px 18px;margin-bottom:16px;box-shadow:0 16px 40px rgba(0,0,0,.16)}.top h1{font-size:1.35rem;margin:.1rem 0 .35rem}.top p{margin:0;opacity:.9}.wrap{max-width:980px;margin:0 auto}.card{background:white;border:1px solid var(--border);border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 10px 28px rgba(0,0,0,.06)}label{display:block;font-weight:800;margin:10px 0 6px}input,select,textarea{width:100%;border:1px solid #cfded6;border-radius:13px;padding:12px 13px;font:inherit;background:#fff}textarea{min-height:110px;resize:vertical}.btn{border:0;border-radius:13px;padding:11px 14px;font-weight:900;cursor:pointer;margin:6px 4px;background:#e8f2ed;color:#17352a}.btn.primary{background:var(--green);color:white}.btn.gold{background:var(--gold);color:white}.btn.danger{background:#b42318;color:white}.btn.light{background:#f1f5f3;color:#17352a}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.status{color:var(--muted);font-weight:700}.pill{display:inline-block;background:#eef7f2;border:1px solid #d4e6dc;border-radius:999px;padding:5px 10px;font-size:.85rem;font-weight:800;color:#174630}.qcard{border-top:4px solid var(--green)}.meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}.small{font-size:.86rem;color:var(--muted)}.private{background:#fff9ec;border:1px solid #efd99e;border-radius:14px;padding:10px;margin:8px 0}.hide{display:none!important}.ltr{direction:ltr;text-align:left}@media(max-width:600px){body{padding:10px}.top{border-radius:0 0 24px 24px;margin:-10px -10px 14px}.btn{width:auto}}
  </style>
</head>
<body>
<div class="wrap">
  <header class="top"><h1>پنل ادمین پرسش و پاسخ امیدنو۷</h1><p>ورود، مشاهده سؤال‌ها، پاسخ دادن و انتشار عمومی بدون نام</p></header>
  <main id="app"><div class="card"><p class="status">در حال بارگذاری...</p></div></main>
</div>
<script>
(function(){
  const SUPABASE_URL='https://uibhpgcsgcievktxmcfg.supabase.co';
  const SUPABASE_KEY='sb_publishable_clP99PgnpuT6a5MCyDfVWQ_e_7wWYrk';
  const ADMIN_EMAIL='omideno7church@gmail.com';
  const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  const app=document.getElementById('app');
  let status='pending';
  const cats={faith_salvation:'ایمان و نجات',bible_theology:'کتاب‌مقدس و الهیات',prayer_spiritual_life:'دعا و زندگی روحانی',church_membership:'کلیسا و عضویت',marriage_family:'ازدواج و خانواده',sexual_relationship_marriage:'رابطه جنسی در ازدواج',sexual_purity_relationships:'پاکی جنسی و روابط پیش از ازدواج',sin_freedom:'گناه، وسوسه و آزادی',work_money_life_decisions:'کار، پول و تصمیم‌های زندگی',ministry_calling:'خدمت و دعوت الهی',private_sensitive:'موضوعات حساس و خصوصی',other:'سایر موضوعات'};
  const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const fmt=d=>d?new Date(d).toLocaleString('fa-IR'):'';
  function shell(inner){app.innerHTML=inner;}
  async function boot(){
    const {data}=await sb.auth.getSession();
    if(data&&data.session){ renderPanel(); load(); } else renderLogin();
  }
  function renderLogin(){
    shell(`<section class="card"><h2>ورود ادمین</h2><p class="status">فقط ایمیل کلیسا اجازه دسترسی دارد.</p><form id="login"><label>ایمیل</label><input class="ltr" name="email" type="email" value="${ADMIN_EMAIL}" autocomplete="email"><label>رمز عبور</label><input name="password" type="password" autocomplete="current-password"><button class="btn primary" type="submit">ورود</button><div id="msg" class="status"></div></form></section>`);
    document.getElementById('login').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.currentTarget);const email=String(fd.get('email')||'').trim().toLowerCase();const password=String(fd.get('password')||'');const msg=document.getElementById('msg');try{const {error}=await sb.auth.signInWithPassword({email,password});if(error)throw error;if(email!==ADMIN_EMAIL){await sb.auth.signOut();throw new Error('این ایمیل ادمین نیست.');}msg.textContent='ورود موفق';renderPanel();load();}catch(err){msg.textContent='خطا: '+(err.message||err);}});
  }
  function renderPanel(){
    shell(`<section class="card"><div class="row"><button class="btn ${status==='pending'?'primary':''}" data-status="pending">در انتظار پاسخ</button><button class="btn ${status==='published'?'primary':''}" data-status="published">منتشرشده</button><button class="btn ${status==='answered_private'?'primary':''}" data-status="answered_private">پاسخ خصوصی</button><button class="btn ${status==='rejected'?'primary':''}" data-status="rejected">رد شده</button><button class="btn light" id="refresh">بارگذاری</button><button class="btn danger" id="logout">خروج</button></div></section><section id="list" class="card"><p class="status">در حال بارگذاری...</p></section>`);
    document.querySelectorAll('[data-status]').forEach(b=>b.addEventListener('click',()=>{status=b.dataset.status;renderPanel();load();}));
    document.getElementById('refresh').addEventListener('click',load);
    document.getElementById('logout').addEventListener('click',async()=>{await sb.auth.signOut();renderLogin();});
  }
  async function load(){
    const list=document.getElementById('list'); if(list) list.innerHTML='<p class="status">در حال بارگذاری...</p>';
    try{const {data,error}=await sb.from('qa_questions').select('*').eq('status',status).order('created_at',{ascending:false}).limit(100);if(error)throw error;renderList(data||[]);}catch(e){if(list) list.innerHTML='<p class="status">خطا: '+esc(e.message||e)+'</p>';}
  }
  function renderList(rows){
    const list=document.getElementById('list'); if(!list)return;
    if(!rows.length){list.innerHTML='<p class="status">سؤالی در این وضعیت وجود ندارد.</p>';return;}
    list.innerHTML=rows.map(r=>`<article class="card qcard" data-id="${esc(r.id)}"><div class="meta"><span class="pill">${esc(cats[r.category]||r.category)}</span><span class="small">${esc(r.language||'')}</span><span class="small">${esc(fmt(r.created_at))}</span></div><div class="private"><strong>اطلاعات شخصی:</strong><br>${esc(r.name||'-')} / ${esc(r.contact||'-')}</div><p><strong>سؤال اصلی:</strong><br>${esc(r.question||'')}</p><label>متن سؤال برای انتشار عمومی بدون نام</label><textarea data-field="public_question">${esc(r.public_question||r.question||'')}</textarea><label>پاسخ</label><textarea data-field="answer">${esc(r.answer||'')}</textarea><label>یادداشت داخلی ادمین</label><textarea data-field="admin_note">${esc(r.admin_note||'')}</textarea><div class="row"><button class="btn gold" data-act="private">ذخیره خصوصی</button><button class="btn primary" data-act="publish">انتشار عمومی بدون نام</button><button class="btn danger" data-act="reject">رد کردن</button></div><div class="status" data-msg></div></article>`).join('');
    list.querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click',()=>save(b.closest('[data-id]'),b.dataset.act)));
  }
  async function save(card,act){
    const msg=card.querySelector('[data-msg]');
    const val=f=>card.querySelector(`[data-field="${f}"]`)?.value.trim()||null;
    const update={public_question:val('public_question'),answer:val('answer'),admin_note:val('admin_note'),answered_at:new Date().toISOString()};
    if(act==='publish'){update.status='published';update.published_at=new Date().toISOString();update.allow_public=true;}
    if(act==='private'){update.status='answered_private';update.published_at=null;}
    if(act==='reject'){update.status='rejected';update.published_at=null;}
    try{const {error}=await sb.from('qa_questions').update(update).eq('id',card.dataset.id);if(error)throw error;msg.textContent='ذخیره شد.';await load();}catch(e){msg.textContent='خطا: '+(e.message||e);}
  }
  boot();
})();
</script>
</body>
</html>
